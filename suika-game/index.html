<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tropic Merge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..700&family=Titan+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-wrap">
  <div id="game-area">
    <canvas id="game"></canvas>
    <div id="ui">
      <button id="mute-btn" class="icon-btn" title="Mute (M)"><span id="mute-icon">&#128266;</span></button>
      <div id="sandbox-panel">
        <div id="spawn-creatures"></div>
        <div id="spawn-controls">
          <button id="spawn-dec" class="spawn-btn">-</button>
          <span id="spawn-count">1</span>
          <button id="spawn-inc" class="spawn-btn">+</button>
          <button id="spawn-do" class="spawn-btn spawn-do">SPAWN</button>
        </div>
        <button id="sb-back-btn" class="icon-btn sb-back" title="Back to menu">&#10005;</button>
      </div>
    </div>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
